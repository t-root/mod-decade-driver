[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1  
framework = arduino 
monitor_speed = 115200
monitor_port = auto
; Dùng direct filter để tránh treo monitor
monitor_filters = direct
; Tắt DTR/RTS để tránh reset ESP32 khi mở monitor
monitor_dtr = 0
monitor_rts = 0 
  
board_build.flash_mode = dio
board_build.flash_freq = 40m
board_build.partitions = huge_app.csv 
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1 
lib_deps =
    dfrobot/DFRobotDFPlayerMini
    bblanchon/ArduinoJson 
